<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영상</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      cursor: pointer;
    }
    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.6s ease;
    }
    #overlay .play-btn {
      width: 72px;
      height: 72px;
      border: 2px solid #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    #overlay .play-btn svg {
      fill: #fff;
      width: 28px;
      height: 28px;
      margin-left: 4px;
    }
    #overlay p {
      color: #ffffff88;
      font-size: 14px;
      font-family: sans-serif;
      letter-spacing: 0.05em;
    }
    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="play-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
    </div>
    <p>탭해서 재생</p>
  </div>

  <iframe
    id="player"
    src="https://drive.google.com/file/d/1UyT3N-Q0Tb_71GuDM8cbEdvMEaGuNE1x/preview"
    allow="autoplay"
    allowfullscreen>
  </iframe>

  <script>
    const overlay = document.getElementById('overlay');
    overlay.addEventListener('click', () => {
      overlay.style.opacity = '0';
      setTimeout(() => { overlay.style.display = 'none'; }, 600);
    });
  </script>
</body>
</html>
